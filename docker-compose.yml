services:
  tubestreamer:
    image: blakdav/tubestreamer:latest
    container_name: tubestreamer
    restart: unless-stopped
    ports:
      - "5005:5000"
    volumes:
      - /mnt/user/media/youtube:/downloads
    environment:
      - DOWNLOAD_DIR=/downloads
